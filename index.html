<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head theme:dark>
<body>
    <div>
    <h1>Expense Tracker</h1>
    <p>Welcome to your Expense Tracker!</p><br>
    <div class="container">
        <form action="main.html" method="post">
            <label for="Date of expense">Date of Expense:</label>
            <input type="date" id="Date of expense" placeholder="Enter expense date"><br><br>
            <section>
                <label for="Category">Category:</label>
                <select id="Category">
                    <option value=""></option>
                    <option value="savings">savings</option>
                    <option value="Food">Food</option>
                    <option value="Transportation">Transportation</option>
                    <option value="Entertainment">Entertainment</option>
                </select>
            </section><br><br>
            <label for="Amount of expense">Amount:</label>
            <input type="number" id="Amount of expense" placeholder="Enter expense amount"><br><br>
            <label for="Payment method">Payment Method:</label>
            <input type="text" id="Payment method" placeholder="Enter payment method"><br><br>
            <label for="Description">Description:</label>
            <input type="text" id="Description" placeholder="Enter expense description"><br><br>
        </form>
        <button type="submit" id="btn" onclick="showAlert('Expense added successfully!')()">Add Expense</button>
    </div>
    </div>
    

</body>
</html>
