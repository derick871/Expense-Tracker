<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <li src=""></li>
</head theme:light>
<body>
    <h1>Expense Tracker</h1>
    <p>Welcome to your Expense Tracker!</p>
    <div>
        <form action="">
            <label for="Date of expense">Date of Expense:</label>
            <input type="date" id="Date of expense" placeholder="Enter expense date"><br><br>
            <section>
                <label for="Category">Category:</label>
                <select id="Category">
                    <option value=""></option>
                    <option value="savings">savings</option>
                    <option value="Food">Food</option>
                    <option value="Transportation">Transportation</option>
                    <option value="Entertainment">Entertainment</option>
                </select>
            </section><br><br>
            <label for="Amount of expense">Amount:</label>
            <input type="number" id="Amount of expense" placeholder="Enter expense amount"><br><br>
            <label for="Payment method">Payment Method:</label>
            <input type="text" id="Payment method" placeholder="Enter payment method"><br><br>
            <label for="Description">Description:</label>
            <input type="text" id="Description" placeholder="Enter expense description">
        </form>
    </div>
    

</body>
</html>
